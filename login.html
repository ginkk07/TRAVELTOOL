  <link href="./images/bootstrap-icons-1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" crossorigin="anonymous">

<body>
<main class="d-flex align-items-center justify-content-center">
  <div class="signup-login LinearGradientBorder">
    <div>
      <h1>Advance RM Tool</h1>
    </div>
    <div style="margin:30px;">
      <label class="input-style">
        <span><img style="width: 21px;" src="./img/icon-id.svg"></span>

      </label>

      <label class="input-style">
        <span><img style="width: 21px;" src="./img/icon-lock.svg"></span>

      </label>

        <p>Account/Password incorrect</p>
      </div>

      <div style="margin: 24px 0;font-size: 12px;text-align: center;letter-spacing: 0.25px;">
        <div class="toggle-button toggle-button--aava">
          <input id="toggleButton2" type="checkbox">
          <label for="toggleButton2"></label>
          <div class="toggle-button__icon"></div>
        </div>
      </div>      
    </div>

    <div style="margin: 10px 30px;">
      <input id="button-login" type="button" style="width: 100%;" value="LOGIN" onclick="location.href='./index.html'">
    </div>

  
  </div>
</main>
<!--script-->
<script>
  $("#button-login").on("click",function(){
    $("#login-msg").css('display','flex').animate({
      opacity:"1",
      marginLeft:"0",
    },200);
  });
</script>
</body>
