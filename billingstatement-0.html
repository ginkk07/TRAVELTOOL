    <script>
    (function() {
        const toggleBtn   = document.getElementById('theme-toggle');
        const rootEl      = document.documentElement;
        const storageKey  = 'theme-preference';

        // 1. 初始化：读取 localStorage 或默认 data-theme
        const currentTheme = localStorage.getItem(storageKey)
                                || rootEl.getAttribute('data-theme')
                                || 'light';
        rootEl.setAttribute('data-theme', currentTheme);

        // 2. 点击切换：只切换 data-theme 并写回 localStorage
        toggleBtn.addEventListener('click', () => {
            const newTheme = rootEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            rootEl.setAttribute('data-theme', newTheme);
            localStorage.setItem(storageKey, newTheme);
        });
    })();
    </script>
