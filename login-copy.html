    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<body>
    <div class="content login">
        <div class="login_block">
            <h3 class="block_title">FCM Tool Kit</h3>
            <div class="block_content">
                <form method="post" action="/Login">
                    <div class="fill_item">
                        <div class="item_content">
                            <div class="input-group group_style2">
                                <div class="input-group-prepend">
                                    <i class="bi bi-person-fill"></i>
                                </div>
                                <input type="text" class="form-control" required="" placeholder="請輸入帳號" data-val="true" data-val-required="帳號為必填" id="Account" name="Account" value="engineer02">
                            </div>
                            <p class="text-danger my-1"><span class="me-1"><i class="bi bi-exclamation-circle"></i></span>查無帳號</p>
                        </div>
                    </div>
                    <div class="fill_item">
                        <div class="item_content">
                            <div class="input-group group_style2">
                                <div class="input-group-prepend">
                                    <i class="bi bi-key-fill"></i>
                                </div>
                                <input type="password" class="form-control" placeholder="請輸入密碼" data-val="true" data-val-required="密碼為必填" id="Password" name="Password">
                            </div>
                            <p class="text-danger my-1"><span class="me-1"><i class="bi bi-exclamation-circle"></i></span>密碼錯誤</p>
                        </div>
                    </div>
                    <!--<div class="fill_item mb-0">
                        <div class="item_content">
                            <div class="checkbox_group group_color2">
                                <input type="checkbox" name="IsRemember" checked="checked" data-val="true" data-val-required="The 記住登入帳號 field is required." id="IsRemember" value="true">
                                <label for="IsRemember">記住登入帳號</label>
                            </div>
                        </div>
                    </div>-->
                    <div style="text-align: center;letter-spacing: 0.25px;">
                        <div class="toggle-button toggle-button--aava">
                        <input id="toggleButton2" type="checkbox">
                        <label for="toggleButton2"  style="font-size: 15.5px;"></label>
                        <div class="toggle-button__icon"></div>
                        </div>
                    </div>
                    <input name="__RequestVerificationToken" type="hidden" value="CfDJ8BdsNEBJDEhEsGF1T06UsdZKQgEndf3NeaNBNx2usSjWsADBtiqowhEHOQYYFFEoKltECU67yKLh42xc7CYIGND0XDhslBlsP6bBR-1OC2Nb1-a4L-1xS_9tDg0OAetYvilVl1McAP6CRCPJ56LxS28">
                    <input name="IsRemember" type="hidden" value="false">
                </form>
            </div>
            <div class="block_bottom">
                <div class="error_message" style="display: none;"><i class="material-icons">error_outline</i></div>
                <a href="javascript:$('form').submit()" class="btn btn-primary w-100">登入</a>
            </div>
        </div>
    </div>
    <script src="./bootstrap/js/bootstrap.min.js?v=aCTIqw9op0XQGYnNe1649V7fnihACD48OP3M8BP2xVM"></script>
    <script src="./jquery/jquery.min.js?v=zp0HUArZHsK1JMJwdk7EyaM-eDINjTdOxADt5Ij2JRs"></script>
    <script src="./jqueryui/jquery-ui.min.js?v=lSjKY0_srUM9BE3dPm-c4fBo1dky2v27Gdjm2uoZaL0"></script>
    <script>
        $('#Password').on('keyup', function (event) {
            if (event.key == 'Enter') {
                $('form').submit();
            }
        });

  $('.error_message').hide();
    </script>
</body>
